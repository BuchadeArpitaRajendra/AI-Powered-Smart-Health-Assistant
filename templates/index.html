<!DOCTYPE html>
<html>
<head>
    <title>AI Health Assistant - Smart Symptom Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 AI-Powered Smart Health Assistant</h1>
            <p>Your personal AI health companion - Quick, smart, and confidential</p>
        </div>
        
        <div class="content">
            <form action="/predict" method="POST">
                <div class="form-group">
                    <label>🤒 Do you have a FEVER?</label>
                    <div class="radio-group">
                        <input type="radio" name="fever" value="1" id="fever_yes" required>
                        <label for="fever_yes">Yes</label>
                        <input type="radio" name="fever" value="0" id="fever_no">
                        <label for="fever_no">No</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>😤 Do you have a COUGH?</label>
                    <div class="radio-group">
                        <input type="radio" name="cough" value="1" id="cough_yes" required>
                        <label for="cough_yes">Yes</label>
                        <input type="radio" name="cough" value="0" id="cough_no">
                        <label for="cough_no">No</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>😴 Are you experiencing FATIGUE?</label>
                    <div class="radio-group">
                        <input type="radio" name="fatigue" value="1" id="fatigue_yes" required>
                        <label for="fatigue_yes">Yes</label>
                        <input type="radio" name="fatigue" value="0" id="fatigue_no">
                        <label for="fatigue_no">No</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🤕 Do you have a HEADACHE?</label>
                    <div class="radio-group">
                        <input type="radio" name="headache" value="1" id="headache_yes" required>
                        <label for="headache_yes">Yes</label>
                        <input type="radio" name="headache" value="0" id="headache_no">
                        <label for="headache_no">No</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>📅 What is your AGE?</label>
                    <input type="number" name="age" required min="0" max="120" placeholder="Enter your age">
                </div>
                
                <button type="submit" class="btn-submit">🔍 Get AI Diagnosis</button>
            </form>
            
            <div class="disclaimer">
                ⚠️ This is an AI demonstration tool. Always consult a healthcare professional for medical advice.
            </div>
        </div>
    </div>
</body>
</html>
